version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - errcheck
    - errorlint
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilerr
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unused
  settings:
    errorlint:
      # Error == / != comparisons (and switch-on-error) are owned by the custom
      # ruleguard `errCompare` rule in gorules/rules.go, which has no blind spot
      # for `err := method(); if err != Sentinel` (errorlint silently misses that
      # single-value short-decl-from-method form). Disabling comparison here keeps
      # the two from double-reporting; errorlint still owns asserts and %w/errorf.
      comparison: false
    gocritic:
      enabled-checks:
        - ruleguard
      settings:
        ruleguard:
          rules: '${base-path}/tools/gorules/rules.go'
    depguard:
      rules:
        no-deep-imports:
          list-mode: lax
          files:
            - '**/apps/**'
            - '**/tools/**'
          deny:
            - pkg: github.com/tabmadi/microservices-monorepo-template/services
              desc: apps/ and tools/ must not import services/<X>/internal/. Use the generated client.
        pgx-transaction-mode:
          list-mode: lax
          files:
            - '**/services/**'
            - '**/libs/go/dbmw/**'
          deny:
            - pkg: github.com/jackc/pgx/v5/stdlib
              desc: Use *pgxpool.Pool, not stdlib database/sql. ADR-0007 §SQL access.
        # NOTE: a `service-isolation` rule denying the whole `services` prefix also
        # flags a service importing its OWN internal packages (legal Go), so it is
        # not expressible cleanly in depguard. Cross-service isolation (ADR-0002,
        # ADR-0008) is enforced by the SDK convention (libs/go/sdks/<svc>/client)
        # plus the no-deep-imports rule above (which blocks apps/ and tools/ from
        # reaching into services/<x>/internal) and code review.
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocritic
          - prealloc
        path: _test\.go
      - linters:
          - revive
        path: tools/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tabmadi/microservices-monorepo-template
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
