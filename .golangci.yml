version: "2"
run:
  tests: true
linters:
  default: all
  disable:
    # --- deprecated ---
    - gomodguard          # replaced by gomodguard_v2
    - wsl                 # replaced by wsl_v5
    # --- fight the gofumpt formatter (unwinnable blank-line loop) ---
    - wsl_v5
    - nlreturn
    # --- contradict idiomatic Go / the ADRs ---
    - exhaustruct         # demands every zero-value field be spelled out
    - varnamelen          # bans idiomatic short names (i, tx, db, r, w)
    - err113              # ADR-0001: no bespoke error DSLs; sentinel-per-error ceremony
    - ireturn             # returns are ADR-mandated interfaces (otel/temporal/authz)
    - gochecknoglobals    # ADR-0011 metrics + CLI flags are idiomatic globals
    - mnd                 # magic-number noise for timeouts/pool sizes
    - tagliatelle         # ADR-0008 API uses snake_case json tags
    - testpackage         # white-box tests of unexported funcs are deliberate
    # --- redundant within the complexity family (keep cyclop + gocognit + funlen) ---
    - gocyclo             # cyclomatic, redundant with cyclop
    - nestif              # subset of gocognit
    - maintidx            # composite of cyclop/gocognit/funlen
  settings:
    cyclop:
      max-complexity: 15
    errcheck:
      disable-default-exclusions: true
    errorlint:
      comparison: false
    gocritic:
      enabled-checks:
        - ruleguard
      settings:
        ruleguard:
          rules: '${base-path}/tools/gorules/rules.go'
    depguard:
      rules:
        no-deep-imports:
          list-mode: lax
          files:
            - '**/apps/**'
            - '**/tools/**'
          deny:
            - pkg: github.com/tabmadi/microservices-monorepo-template/services
              desc: apps/ and tools/ must not import services/<X>/internal/. Use the generated client.
        pgx-transaction-mode:
          list-mode: lax
          files:
            - '**/services/**'
            - '**/libs/go/dbmw/**'
          deny:
            - pkg: github.com/jackc/pgx/v5/stdlib
              desc: Use *pgxpool.Pool, not stdlib database/sql. ADR-0007 §SQL access.
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
    rules:
      - linters:
          - errcheck
          - funlen
          - gocritic
          - prealloc
        path: _test\.go
      - linters:
          - revive
        path: tools/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tabmadi/microservices-monorepo-template
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
