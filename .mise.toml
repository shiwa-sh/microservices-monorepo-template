[tools]
# Languages & runtimes
go = "1.26.3"
bun = "1.3.14"

# Database tooling
dbmate = "v2.33.0"
sqlc = "v1.31.1"
"github:quarylabs/sqruff" = "0.38.0"

# API contracts & codegen
"go:github.com/ogen-go/ogen/cmd/ogen" = "v1.20.3"
vacuum = "0.28.4"

# Frontend toolchain
biome = "2.4.16"

# Kubernetes & infra
helm = "4.2.0"
kubectl = "1.36.1"
cilium-cli = "0.18.4"
kustomize = "5.8.1"
terraform = "1.15.3"
k3d = "v5.8.3"
skaffold = "2.21.0"
ansible = "13.6.0"

# Secrets
age = "v1.3.1"
sops = "v3.13.1"

# Repo hygiene
lefthook = "2.1.8"
cocogitto = "7.0.0"
act = "0.2.89"
golangci-lint = "v2.12.2"
gofumpt = "0.10.0"
rumdl = "0.2.6"

[env]
GOFLAGS = "-mod=readonly"
CGO_ENABLED = "0"

[tasks.setup]
run = "lefthook install"

[tasks."tools:upgrade"]
# Usage: mise run tools:upgrade [-- --dry-run] [-- --yes]
run = "bash scripts/upgrade-tools.sh"

[tasks."cluster:up"]
# Create the local k3d cluster + lightweight deps (Postgres, Temporal, SpiceDB).
run = "bash scripts/cluster-up.sh"

[tasks."cluster:down"]
# Delete the local k3d cluster.
run = "bash scripts/cluster-down.sh"

[tasks.dev]
# Inner loop: build, deploy and live-reload services in k3d (ADR-0003).
# Trailing args are forwarded to skaffold, so you can scope to one service:
#   mise run dev                 # all services + deps port-forwards
#   mise run dev -m orders       # just orders (others keep their last deploy)
#   mise run dev -m orders -m payment
depends = ["cluster:up"]
run = "skaffold dev"

[tasks."db:migrate"]
# Apply each service's migrations to the local Postgres (ADR-0007).
run = "bash scripts/db-migrate.sh"

[tasks."secrets:age"]
# Generate the SOPS age key (idempotent) and write .sops.yaml (ADR-0005).
run = "bash scripts/gen-age.sh"

[tasks."gen:all"]
depends = ["gen:openapi", "gen:sqlc", "gen:tyk"]

[tasks."gen:openapi"]
run = "bash scripts/gen-openapi.sh"

[tasks."gen:sqlc"]
run = "bash scripts/gen-sqlc.sh"

[tasks."gen:tyk"]
run = "go run ./tools/codegen/tyk-gen"

[tasks."gen:clean"]
# Wipe generated SDKs/gateway CRs and regenerate, pruning orphans. (sqlc untouched.)
run = """
rm -rf libs/go/sdks/* libs/ts/sdks/*
find infra/gateway/apis -name '*.yaml' -delete
mise run gen:all
"""

[tasks.lint]
depends = ["lint:go", "lint:sql", "lint:openapi", "lint:floating-tags", "lint:ts", "lint:md"]

[tasks."lint:ts"]
run = "biome ci ."

[tasks."lint:go"]
run = "golangci-lint run ./..."

[tasks."lint:sql"]
run = "bash scripts/lint-sql.sh"

[tasks."lint:openapi"]
run = "bash scripts/lint-openapi.sh"

[tasks."lint:floating-tags"]
run = "bash scripts/lint-floating-tags.sh"

[tasks."lint:md"]
# Reads rules and ignores from .rumdl.toml at repo root.
run = "rumdl check ."

[tasks.test]
run = "go test ./..."

[tasks.build]
run = "go build ./..."

[tasks."ci:affected"]
run = "go run ./tools/affected"

[tasks."ci:lint"]
depends = ["lint"]

[tasks."ci:test"]
depends = ["test"]

[tasks."ci:build"]
depends = ["build"]

[tasks."ci:gen"]
# Regenerate everything and fail if anything changed (drift check)
run = "mise run gen:all && git diff --exit-code"

[tasks.format]
depends = ["format:go", "format:ts", "format:md"]

[tasks."format:go"]
run = "gofumpt -w ."

[tasks."format:ts"]
run = "biome format --write ."

[tasks."format:md"]
# rumdl is the only Markdown formatter — do NOT rely on the IDE's
# Ctrl+Alt+L for .md files (see docs/adr / README).
run = "rumdl fmt ."

[tasks.pre-commit]
depends = ["format", "lint"]

[tasks.check]
depends = ["format", "lint", "test"]

[tasks.act]
run = "act pull_request --secret-file .env -e .github/act/pull_request.json"
