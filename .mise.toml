[tools]
# Languages & runtimes
go = "1.26.3"
bun = "1.3.14"

# Database tooling
dbmate = "v2.33.0"
sqlc = "v1.31.1"
"pipx:sqlfluff" = "4.2.1"

# API contracts & codegen
oapi-codegen = "v2.7.0"
spectral = "6.15.0"
"npm:openapi-typescript" = "7.13.0"

# Frontend toolchain
biome = "1.9.4"

# Kubernetes & infra
helm = "4.2.0"
kubectl = "1.36.1"
kustomize = "5.8.1"
terraform = "1.15.3"
k3d = "v5.8.3"
ansible = "13.6.0"

# Secrets
age = "v1.3.1"
sops = "v3.13.1"

# Repo hygiene
lefthook = "2.1.8"
cocogitto = "7.0.0"
act = "0.2.88"
golangci-lint = "v2.12.2"
"npm:markdownlint-cli2" = "0.22.1"

[env]
GOFLAGS = "-mod=readonly"
CGO_ENABLED = "0"

[tasks.setup]
run = "lefthook install"

[tasks."tools:upgrade"]
# Usage: mise run tools:upgrade [-- --dry-run] [-- --yes]
run = "bash scripts/upgrade-tools.sh"

[tasks."dev:up"]
# Create the local k3d cluster + lightweight deps (Postgres, Temporal, SpiceDB).
run = "bash scripts/dev-up.sh"

[tasks."dev:down"]
# Delete the local k3d cluster.
run = "bash scripts/dev-down.sh"

[tasks.dev]
# Inner loop: build, deploy and live-reload services in k3d (ADR-0003).
depends = ["dev:up"]
run = "skaffold dev"

[tasks."dev:debug"]
# Same as dev, with Delve attached for IDE remote-debugging.
depends = ["dev:up"]
run = "skaffold debug"

[tasks."dev:migrate"]
# Apply each service's migrations to the local Postgres (ADR-0007).
run = "bash scripts/dev-migrate.sh"

[tasks."gen:all"]
depends = ["gen:openapi", "gen:sqlc", "gen:tyk"]

[tasks."gen:openapi"]
run = "bash scripts/gen-openapi.sh"

[tasks."gen:sqlc"]
run = "bash scripts/gen-sqlc.sh"

[tasks."gen:tyk"]
run = "go run ./tools/codegen/tyk-gen"

[tasks.lint]
depends = ["lint:go", "lint:sql", "lint:openapi", "lint:floating-tags", "lint:ts", "lint:md"]

[tasks."lint:ts"]
run = "biome ci ."

[tasks."lint:go"]
run = "golangci-lint run ./..."

[tasks."lint:sql"]
run = "bash scripts/lint-sql.sh"

[tasks."lint:openapi"]
run = "bash scripts/lint-openapi.sh"

[tasks."lint:floating-tags"]
run = "bash scripts/lint-floating-tags.sh"

[tasks."lint:md"]
# Reads rules from .markdownlint.jsonc, globs/ignores from .markdownlint-cli2.jsonc.
run = "markdownlint-cli2"

[tasks.test]
run = "go test ./..."

[tasks.build]
run = "go build ./..."

[tasks."ci:affected"]
run = "go run ./tools/affected"

[tasks."ci:lint"]
depends = ["lint"]

[tasks."ci:test"]
depends = ["test"]

[tasks."ci:build"]
depends = ["build"]

[tasks."ci:gen"]
# Regenerate everything and fail if anything changed (drift check)
run = "mise run gen:all && git diff --exit-code"

[tasks.format]
depends = ["format:go", "format:ts", "format:md"]

[tasks."format:go"]
run = "gofmt -w ."

[tasks."format:ts"]
run = "biome format --write ."

[tasks."format:md"]
# markdownlint is the only Markdown formatter — do NOT rely on the IDE's
# Ctrl+Alt+L for .md files (see docs/adr / README).
run = "markdownlint-cli2 --fix"

[tasks.pre-commit]
depends = ["format", "lint"]

[tasks.check]
depends = ["format", "lint", "test"]

[tasks.act]
run = "act pull_request --secret-file .env -e .github/act/pull_request.json -j checks"
