[tools]
# Languages & runtimes
go = "1.26.4"
bun = "1.3.14"
# Test-only escape hatch (ADR-0001/ADR-0018): Node runs the Playwright e2e/visual
# runner ONLY — Bun cannot drive a browser test runner reliably. Confined to the
# repo-root e2e/ workspace + CI by `lint:node-scope`; never in a service or app.
node = "22"

# Database tooling
dbmate = "2.33.0"
sqlc = "1.31.1"
"github:quarylabs/sqruff" = "0.38.0"

# API contracts & codegen
"go:github.com/ogen-go/ogen/cmd/ogen" = "1.22.0"
vacuum = "0.29.2"

# Frontend toolchain
biome = "2.5.0"

# Kubernetes & infra
helm = "4.2.2"
kubectl = "1.36.2"
cilium-cli = "0.19.4"
kustomize = "5.8.1"
terraform = "1.15.6"
k3d = "5.9.0"
skaffold = "2.22.0"
ansible = "14.0.0"

# Secrets
age = "1.3.1"
sops = "3.13.1"

# Authorization (SpiceDB schema validation)
"github:authzed/zed" = "1.1.1"

# Repo hygiene
lefthook = "2.1.9"
cocogitto = "7.0.0"
act = "0.2.89"
golangci-lint = "2.12.2"
rumdl = "0.2.18"

[env]
GOFLAGS = "-mod=readonly"
CGO_ENABLED = "0"

[tasks.setup]
run = "lefthook install"

[tasks.upgrade]
depends = ["upgrade:tools", "upgrade:js", "upgrade:go"]

[tasks."upgrade:tools"]
run = "bash scripts/upgrade-tools.sh"

[tasks."upgrade:js"]
run = "bun update --latest --recursive"

[tasks."upgrade:go"]
# GOFLAGS override: go get must write go.mod (env pins -mod=readonly).
# Scope to Go roots so go get skips node_modules (bun symlinks → "ignoring symlink" noise).
run = """
GOFLAGS= go get -u ./libs/... ./services/... ./tools/...
GOFLAGS= go mod tidy
"""

[tasks."cluster:up"]
# Brings up Postgres, Temporal, SpiceDB alongside the cluster.
run = "bash scripts/cluster-up.sh"

[tasks."cluster:down"]
run = "bash scripts/cluster-down.sh"

[tasks."cluster:full:up"]
# Heavy local platform. Optional profile arg selects the component subset:
#   mise run cluster:full:up [min|backend|obs|full]   (default full)
# See docs/dev-loop.md.
run = "bash scripts/cluster-full.sh"

[tasks."cluster:full:down"]
# Stops the cluster but KEEPS it (image cache + volumes survive) so the next
# `cluster:full:up` resumes without re-pulling. To delete entirely, use :purge.
run = "bash scripts/cluster-full-down.sh"

[tasks."cluster:full:purge"]
# Deletes the cluster and wipes its image cache (reclaims disk, clean rebuild).
run = "bash scripts/cluster-full-purge.sh"

[tasks.dev]
# Trailing args forward to skaffold; -m scopes to one service (ADR-0003).
depends = ["cluster:up"]
run = "skaffold dev"

[tasks."dev:obs"]
# Opt-in observability (ADR-0011). For host-run `next dev`, set
# FARO_COLLECT_URL=http://localhost:12347/collect.
depends = ["cluster:up"]
run = "skaffold dev -m observability -p obs"

[tasks."dev:all"]
# Services + observability in one loop.
depends = ["cluster:up"]
run = "skaffold dev -p obs"

[tasks."e2e:install"]
# One-time (and CI) setup: install the e2e workspace deps and the Chromium binary.
# Node-only island (ADR-0018); npm is bundled with the Node tool above.
run = """
npm --prefix e2e ci || npm --prefix e2e install
npm --prefix e2e run install:browsers
"""

# The edge (*.localtest.me) must be hit directly, never through a dev HTTPS_PROXY;
# the in-cluster port-forwards are loopback. Belt-and-suspenders for both cases.
[tasks.e2e]
# Full browser acceptance + visual suite against a running cluster:full (ADR-0018).
# Nightly + pre-release in CI; never part of ci:affected.
env = { NO_PROXY = "localhost,127.0.0.1,.localtest.me", no_proxy = "localhost,127.0.0.1,.localtest.me" }
run = "npm --prefix e2e run test"

[tasks."e2e:smoke"]
# Label-gated per-PR subset: one product golden path + a key dashboard render.
env = { NO_PROXY = "localhost,127.0.0.1,.localtest.me", no_proxy = "localhost,127.0.0.1,.localtest.me" }
run = "npm --prefix e2e run test:smoke"

[tasks."db:migrate"]
run = "bash scripts/db-migrate.sh"

[tasks."secrets:age"]
# Idempotent; also writes .sops.yaml (ADR-0005).
run = "bash scripts/gen-age.sh"

[tasks.gen]
# No gateway codegen — the edge (Traefik + Oathkeeper) does not consume the
# OpenAPI spec; ogen + sqlc are the only generators (ADR-0008, ADR-0009).
depends = ["gen:openapi", "gen:sqlc"]

[tasks."gen:openapi"]
run = "bash scripts/gen-openapi.sh"

[tasks."gen:sqlc"]
run = "bash scripts/gen-sqlc.sh"

[tasks."gen:clean"]
# Wipe generated SDKs and regenerate, pruning orphans. (sqlc untouched.)
run = """
rm -rf libs/go/sdks/* libs/ts/sdks/*
mise run gen
"""

[tasks.lint]
depends = ["lint:go", "lint:gostyle", "lint:sql", "lint:openapi", "lint:floating-tags", "lint:ts", "lint:md", "lint:auth-inline", "lint:authz", "lint:node-scope"]

[tasks."lint:node-scope"]
# Node confinement guard (ADR-0001/ADR-0018): Node/npm may appear ONLY in the
# repo-root e2e/ workspace. Fails if a package-lock.json or node_modules leaks
# elsewhere, or if e2e/ is pulled into the Bun workspace.
run = "bash scripts/lint-node-scope.sh"

[tasks."lint:auth-inline"]
# Auth config single-source guard (ADR-0009/0010): fails if kratos/oathkeeper
# config is re-inlined into the Ory chart values instead of living in infra/auth/*.
run = "bash scripts/lint-auth-inline.sh"

[tasks."lint:authz"]
# Edge-auth policy gates (ADR-0009/0010/0017):
#   - SpiceDB schema + assertions (zed validate)
#   - ops dashboards authorize via remote_json → Checker, never `allow`
#   - every forward-auth route strips client identity headers first (anti-spoofing)
run = """
bash scripts/validate-spicedb.sh
bash scripts/lint-authorizer.sh
bash scripts/lint-strip-headers.sh
"""

[tasks."lint:ts"]
run = "biome ci --error-on-warnings ."

[tasks."lint:go"]
run = "golangci-lint run ./..."

[tasks."lint:gostyle"]
# Custom layout-based Go style analyzers
run = "go run ./tools/gostyle ./..."

[tasks."lint:sql"]
run = "bash scripts/lint-sql.sh"

[tasks."lint:openapi"]
run = "bash scripts/lint-openapi.sh"

[tasks."lint:floating-tags"]
run = "bash scripts/lint-floating-tags.sh"

[tasks."lint:md"]
run = "rumdl check ."

[tasks.test]
run = "go test ./..."

[tasks.build]
run = "go build ./..."

[tasks."ci:affected"]
run = "go run ./tools/affected"

[tasks."ci:lint"]
depends = ["lint"]

[tasks."ci:test"]
depends = ["test"]

[tasks."ci:build"]
depends = ["build"]

[tasks."ci:gen"]
# Drift check: fail if regeneration changes anything.
run = "mise run gen && git diff --exit-code"

[tasks.format]
depends = ["format:go", "format:ts", "format:md"]

[tasks."format:go"]
run = "golangci-lint fmt ./..."

[tasks."format:ts"]
run = "biome format --write ."

[tasks."format:md"]
# rumdl is the only Markdown formatter — never the IDE's.
run = "rumdl fmt ."

[tasks.pre-commit]
depends = ["format", "lint"]

[tasks.check]
depends = ["format", "lint", "test"]

[tasks.act]
run = "act pull_request --secret-file .env -e .github/act/pull_request.json"
