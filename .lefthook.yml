# Git hooks (ADR-0002, ADR-0013). Installed via `mise run setup`.

commit-msg:
  commands:
    cog:
      run: cog verify --ignore-merge-commits --file {1}

pre-commit:
  parallel: true
  commands:
    go-fmt:
      glob: "*.go"
      # golangci-lint fmt applies the formatters from .golangci.yml and skips
      # generated files (formatters.exclusions.generated), unlike bare gofumpt.
      run: golangci-lint fmt {staged_files}
      stage_fixed: true
    golangci-lint:
      glob: "*.go"
      # Analyse packages, not the staged file list: golangci-lint rejects file
      # arguments that span more than one directory. --new-from-rev still scopes
      # reporting to issues introduced by the staged changes.
      run: golangci-lint run --new-from-rev HEAD ./...
    sqruff:
      glob: "{services/**/migrations/*.sql,services/**/internal/store/queries/*.sql}"
      run: sqruff lint {staged_files}
    vacuum:
      glob: "services/**/openapi.yaml"
      run: vacuum lint --ruleset tools/codegen/openapi-ruleset.yaml --fail-severity error {staged_files}
    floating-tags:
      run: bash scripts/lint-floating-tags.sh
    gen-drift:
      glob: "{services/**/openapi.yaml,services/**/internal/store/queries/*.sql,services/**/migrations/*.sql,sqlc.yaml}"
      run: mise run ci:gen
    biome:
      glob: "{apps/**/*.{ts,tsx,js,jsx,json},libs/ts/**/*.{ts,tsx,js,jsx,json}}"
      run: biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    rumdl:
      glob: "*.md"
      run: rumdl check --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    cog-check:
      run: cog check --ignore-merge-commits
