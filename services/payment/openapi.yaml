openapi: 3.1.0
info: { title: payment, version: 0.1.0 }
servers: [{ url: /api/payment }]
tags: [{ name: charges }]
paths:
  /charges:
    post:
      operationId: createCharge
      tags: [charges]
      description: |
        Starts the Charge Temporal workflow. Idempotent on Idempotency-Key header.
        Returns a workflow handle (ADR-0006).
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChargeInput" }
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "../../api/shared/workflow-handle.yaml#/WorkflowHandle" }
        default: { $ref: "../../api/shared/error.yaml#/Error" }
  /charges/{id}:
    get:
      operationId: getCharge
      tags: [charges]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Charge" } } } }
        default: { $ref: "../../api/shared/error.yaml#/Error" }
components:
  schemas:
    ChargeInput:
      type: object
      required: [order_id, amount_cents]
      properties:
        order_id:     { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 1 }
    Charge:
      type: object
      required: [id, order_id, amount_cents, status]
      properties:
        id:           { type: string, format: uuid }
        order_id:     { type: string, format: uuid }
        amount_cents: { type: integer }
        status:       { type: string, enum: [pending, settled, failed, refunded] }
