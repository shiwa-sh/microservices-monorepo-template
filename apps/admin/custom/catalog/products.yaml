# Hand-written admin page (ADR-0012). Day one, admin pages live under custom/;
# the OpenAPI-driven generator (tools/admin-gen + _generated/) is added only
# when the page count justifies it.
id: products
type: PageHeaderMenu
properties:
  title: Products
requests:
  - id: list
    type: AxiosHttp
    connectionId: catalog
    properties:
      url: /products
      method: get
blocks:
  - id: table
    type: AgGridAlpine
    properties:
      rowData:
        _request: list
      columnDefs:
        - { field: id, headerName: ID }
        - { field: name, headerName: Name }
        - { field: price_cents, headerName: Price (cents) }
