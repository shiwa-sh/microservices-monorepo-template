# Hand-written page. Demonstrates the escape hatch from generated pages
# (ADR-0012). Submits a refund through the payment service's HTTP API rather
# than touching the DB.
id: refund-tool
type: PageHeaderMenu
properties:
  title: Refund tool
requests:
  - id: refund
    type: AxiosHttp
    connectionId: payment
    # Requests evaluate server-side: carry client state in `payload` (where _state
    # is allowed) and reference it via _payload in properties.
    payload:
      chargeId: { _state: chargeId }
      reason: { _state: reason }
    properties:
      url:
        _string_concat: ["/charges/", { _payload: chargeId }, "/refund"]
      method: post
      data:
        reason: { _payload: reason }
blocks:
  - id: chargeId
    type: TextInput
    properties: { label: Charge ID }
  - id: reason
    type: TextArea
    properties: { label: Reason }
  - id: submit
    type: Button
    properties: { title: Refund }
    events:
      onClick:
        - id: doRefund
          type: Request
          params: refund
