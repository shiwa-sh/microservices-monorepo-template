# Root App-of-Apps (ADR-0004). One manual `kubectl apply` of this file at cluster
# bootstrap; everything else is reconciled from git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
    targetRevision: master
    path: infra/gitops/bootstrap
    directory:
      recurse: true
      exclude: root-application.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
