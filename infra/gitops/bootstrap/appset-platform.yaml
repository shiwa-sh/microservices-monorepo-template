# Platform ApplicationSet (ADR-0004). One Application per platform component
# per environment. Sync waves order CRDs → operators → instances.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata: { name: platform, namespace: argocd }
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - { env: dev,     server: "https://kubernetes.default.svc" }
                - { env: staging, server: "https://kubernetes.default.svc" }
                - { env: prod,    server: "https://kubernetes.default.svc" }
          - git:
              repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
              revision: master
              directories:
                - { path: "infra/helm/platform/*" }
  template:
    metadata:
      name: "{{ .env }}-platform-{{ .path.basename }}"
      annotations:
        argocd.argoproj.io/sync-wave: "10"
    spec:
      project: default
      source:
        repoURL: https://github.com/tabmadi/microservices-monorepo-template.git
        targetRevision: master
        path: "{{ .path.path }}"
        helm:
          # Stable Helm release name = chart basename, so resources are named
          # the same under ArgoCD as under a direct `helm install <chart>` (a
          # bare release name would prefix every resource with the app name and
          # break in-cluster DNS / cross-component refs).
          releaseName: "{{ .path.basename }}"
          # Auth config single source (Phase 0.4): the Ory app pulls its kratos/
          # oathkeeper config from the canonical infra/auth tree — map configs as
          # valueFiles, the identity-schema + access-rules strings as fileParameters.
          # Paths are relative to each chart dir (infra/helm/platform/<component>);
          # non-Ory components ignore the extra keys.
          # Auth overlays first; the per-env file layers last so its host/dsn/secret
          # overrides win (later valueFiles take precedence in Helm).
          valueFiles:
            - "../../../auth/kratos/values.yaml"
            - "../../../auth/oathkeeper/values.yaml"
            - "../../../gitops/platform/{{ .env }}/values.yaml"
          fileParameters:
            - name: 'kratos.kratos.identitySchemas.user\.v1\.json'
              path: "../../../auth/kratos/identity-schemas/user.v1.json"
            - name: oathkeeper.oathkeeper.accessRules
              path: "../../../auth/oathkeeper/access-rules.json"
            # SpiceDB schema for the seed Job (ADR-0007); only the spicedb chart
            # reads it, the rest ignore the extra value.
            - name: seed.schema
              path: "../../../auth/spicedb/schema.zed"
      destination: { server: "{{ .server }}", namespace: platform }
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
