# Lightweight local dependencies for the inner dev loop (ADR-0003).
# NOT the production components — these are throwaway, in-memory/ephemeral stand-ins
# so a service (run via `skaffold dev`) has Postgres, Temporal and SpiceDB to talk to.
# The production-grade versions (CNPG, the Temporal Helm chart, operator-backed
# SpiceDB) are exercised by ArgoCD in staging/prod, not here.
apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
# --- Postgres (plain image, ephemeral) -------------------------------------
apiVersion: v1
kind: ConfigMap
metadata: { name: postgres-initdb, namespace: platform }
data:
  init.sql: |
    CREATE DATABASE orders;
    CREATE DATABASE catalog;
    CREATE DATABASE orgs;
    CREATE DATABASE payment;
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres, namespace: platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - { name: POSTGRES_USER,     value: dev }
            - { name: POSTGRES_PASSWORD, value: dev }
            - { name: POSTGRES_DB,       value: dev }
          ports: [{ containerPort: 5432 }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "dev"] }
            initialDelaySeconds: 3
          volumeMounts:
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d }
      volumes:
        - name: initdb
          configMap: { name: postgres-initdb }
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: platform }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
# --- Temporal dev server (in-memory, includes Web UI on 8233) ---------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: temporal, namespace: platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: temporal } }
  template:
    metadata: { labels: { app: temporal } }
    spec:
      containers:
        - name: temporal
          image: temporalio/temporal:latest
          args: ["server", "start-dev", "--ip", "0.0.0.0"]
          ports:
            - { name: grpc, containerPort: 7233 }
            - { name: ui,   containerPort: 8233 }
          readinessProbe:
            tcpSocket: { port: 7233 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata: { name: temporal, namespace: platform }
spec:
  selector: { app: temporal }
  ports:
    - { name: grpc, port: 7233, targetPort: 7233 }
    - { name: ui,   port: 8233, targetPort: 8233 }
---
# --- SpiceDB (in-memory datastore, fixed dev preshared key) -----------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: spicedb, namespace: platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: spicedb } }
  template:
    metadata: { labels: { app: spicedb } }
    spec:
      containers:
        - name: spicedb
          image: authzed/spicedb:latest
          args: ["serve", "--grpc-preshared-key", "dev", "--datastore-engine", "memory"]
          ports: [{ name: grpc, containerPort: 50051 }]
          readinessProbe:
            tcpSocket: { port: 50051 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata: { name: spicedb, namespace: platform }
spec:
  selector: { app: spicedb }
  ports: [{ port: 50051, targetPort: 50051 }]
---
# --- Per-service DATABASE_URL secrets (consumed via secrets.envFrom) --------
apiVersion: v1
kind: Secret
metadata: { name: orders-db, namespace: platform }
stringData: { DATABASE_URL: "postgres://dev:dev@postgres:5432/orders?sslmode=disable" }
---
apiVersion: v1
kind: Secret
metadata: { name: catalog-db, namespace: platform }
stringData: { DATABASE_URL: "postgres://dev:dev@postgres:5432/catalog?sslmode=disable" }
---
apiVersion: v1
kind: Secret
metadata: { name: orgs-db, namespace: platform }
stringData: { DATABASE_URL: "postgres://dev:dev@postgres:5432/orgs?sslmode=disable" }
---
apiVersion: v1
kind: Secret
metadata: { name: payment-db, namespace: platform }
stringData: { DATABASE_URL: "postgres://dev:dev@postgres:5432/payment?sslmode=disable" }
