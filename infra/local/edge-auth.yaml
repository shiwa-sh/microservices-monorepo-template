# Local-only edge wiring for the Kratos login flow (ADR-0009/0010/0014). Unlike
# prod, the frontend is NOT deployed in-cluster locally — it runs on the host via
# `next dev`. Serving it (and the Kratos public API) from the same origin as the
# edge, https://dev.localtest.me:8443, is what keeps the ory_kratos_session cookie
# on the host Oathkeeper checks for the gated routes. The cookie is domain-scoped
# to dev.localtest.me (set in the kratos values), so it also covers subdomains
# like hubble.dev.localtest.me. Applied by scripts/cluster-full.sh
# (NOT infra/gateway, which ArgoCD syncs to prod).
---
# Kratos serves its endpoints at root; serve.public.base_url only advertises the
# /auth/ path (infra/gitops/platform/local/values.yaml), so the edge strips it.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-auth
  namespace: platform
spec:
  stripPrefix:
    prefixes:
      - /auth
---
# Selector-less Service for the host `next dev`. CoreDNS has no host.k3d.internal
# record, so cluster-full.sh attaches an EndpointSlice pointing at the docker
# bridge gateway (the host) on :3000 — the only host IP routable from pods.
apiVersion: v1
kind: Service
metadata:
  name: frontend-dev
  namespace: platform
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
# Kratos self-service API + session/well-known endpoints → ory-kratos-public.
# Strip /auth and rate-limit the auth-sensitive surface. The UI pages themselves
# (/auth/login …) are NOT matched here; they fall through to the frontend below.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kratos-public
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: PathPrefix(`/auth/self-service`) || PathPrefix(`/auth/.well-known`) || PathPrefix(`/auth/sessions`)
      middlewares:
        - name: strip-auth
        - name: auth-ratelimit
        - name: security-headers
      services:
        - name: ory-kratos-public
          port: 80
  tls:
    secretName: wildcard-tls
---
# Catch-all → host `next dev`. The routes above and the per-service /api/<svc>
# and /internal routes are longer prefixes, and the hubble.<host> route matches
# by Host, so Traefik matches them first; everything else (landing, /auth/login,
# /panel …) is served by the app.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend
  namespace: platform
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: PathPrefix(`/`)
      services:
        - name: frontend-dev
          port: 3000
  tls:
    secretName: wildcard-tls
