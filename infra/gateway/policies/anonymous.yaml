# Tyk SecurityPolicy for unauthenticated public endpoints (ADR-0009).
apiVersion: tyk.tyk.io/v1alpha1
kind: SecurityPolicy
metadata: { name: anonymous, namespace: tyk }
spec:
  name: anonymous
  active: true
  rate:   100
  per:    60
  quota_max: -1
  access_rights_array: []         # restricted per API via X-No-Auth header or per-route override
