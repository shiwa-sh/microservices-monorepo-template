{{- if .Values.ingress.enabled }}
# Strip the /api/<svc> prefix before the request reaches the backend: services
# mount their router at root (e.g. /orders), but the edge routes them under
# /api/<svc>/. Applied AFTER oathkeeper-forward-auth so Oathkeeper still matches
# the rule on the original /api/<svc> path.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "service.fullname" . }}-stripprefix
  labels: {{- include "service.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - {{ include "service.ingressPath" . | trimSuffix "/" | quote }}
---
# Traefik IngressRoute (ADR-0003, ADR-0009). Traefik fronts the edge: /api/<svc>
# traffic passes through the Oathkeeper ForwardAuth middleware, which validates
# the Kratos session / Hydra JWT and injects the trusted identity headers the
# service reads. Static browser-security headers are stamped on every response.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "service.fullname" . }}
  labels: {{- include "service.labels" . | nindent 4 }}
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: Host(`{{ required ".Values.ingress.host is required when ingress.enabled" .Values.ingress.host }}`) && PathPrefix(`{{ include "service.ingressPath" . }}`)
      middlewares:
        # Anti-spoofing (ADR-0009): strip any client-supplied identity headers
        # BEFORE forwardAuth, so a client cannot inject X-User-* on an anonymous
        # /api route (Oathkeeper re-adds the authoritative values).
        - name: strip-identity-headers
          namespace: platform
        - name: oathkeeper-forward-auth
          namespace: platform
        - name: security-headers
          namespace: platform
        - name: {{ include "service.fullname" . }}-stripprefix
      services:
        - name: {{ include "service.fullname" . }}-server
          port: 80
  tls:
    secretName: wildcard-tls
{{- end }}
