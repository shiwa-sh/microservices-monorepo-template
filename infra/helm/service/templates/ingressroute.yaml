{{- if .Values.ingress.enabled }}
# Traefik IngressRoute (ADR-0003). Traefik fronts the gateway; for internal
# routes that bypass Tyk (rare — typically admin endpoints), route directly here.
# Most API traffic goes /api/* → Tyk → service via this IngressRoute's host name.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "service.fullname" . }}
  labels: {{- include "service.labels" . | nindent 4 }}
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: Host(`{{ required ".Values.ingress.host is required when ingress.enabled" .Values.ingress.host }}`) && PathPrefix(`{{ include "service.ingressPath" . }}`)
      services:
        - name: {{ include "service.fullname" . }}-server
          port: 80
  tls:
    secretName: wildcard-tls
{{- end }}
