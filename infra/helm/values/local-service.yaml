# Shared local overrides for the service chart (infra/helm/service), applied by
# Skaffold on top of the chart defaults (ADR-0003). Per-service values — name,
# image, and the DATABASE_URL secret — are injected by Skaffold per release.
#
# Same chart as prod; only the knobs that don't make sense on a laptop are flipped:
server:
  replicas: 1

ingress:
  enabled: false          # no Traefik locally; call the service directly

networkPolicy:
  enabled: false          # skip policy enforcement locally

migrations:
  enabled: false          # apply via `mise run dev:migrate` against the local DB

otel:
  endpoint: ""            # no collector locally

# Endpoints point at the lightweight deps in infra/local/deps.yaml.
env:
  TEMPORAL_HOST_PORT: "temporal:7233"
  TEMPORAL_NAMESPACE: "default"
  SPICEDB_ENDPOINT: "spicedb:50051"
  SPICEDB_PRESHARED_KEY: "dev"
  OTEL_SDK_DISABLED: "true"
