# Minimal local profile (ADR-0003): only what an inner-loop service needs.
# - Postgres (CNPG)
# - Temporal dev server
# - OTel-LGTM bundle (in-memory retention)
# - MinIO
# Disabled: ArgoCD, cert-manager, gateway, auth stack, alerting, long-term storage.
certManager:   { enabled: false }
postgres:      { enabled: true }
temporal:      { enabled: true }
tyk:           { enabled: false }
ory:           { enabled: false }
spicedb:       { enabled: false }
observability: { enabled: true }
minio:         { enabled: true }
sopsOperator:  { enabled: false }
lowdefy:       { enabled: false }

postgres:
  cluster:
    instances: 1
    storage: { size: 1Gi }
    pooler:  { instances: 1, defaultPoolSize: 10 }
    backup:  { enabled: false }

temporal:
  temporal:
    server:
      replicaCount: 1
    web: { enabled: true }

observability:
  loki:               { deploymentMode: SingleBinary, loki: { commonConfig: { replication_factor: 1 } }, singleBinary: { persistence: { enabled: false } } }
  mimir-distributed:  { mimir: { structuredConfig: { ingester: { ring: { replication_factor: 1 } } } } }
  tempo:              { persistence: { enabled: false } }
  pyroscope:          { pyroscope: { replicas: 1, persistence: { enabled: false } } }
  grafana:            { persistence: { enabled: false } }
