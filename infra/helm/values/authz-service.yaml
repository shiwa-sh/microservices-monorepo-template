# Full-tier overlay for the authz edge authorizer (ADR-0017), layered over
# local-service.yaml by the Skaffold `authz` module under cluster:full.
#
# authz is INTERNAL: Oathkeeper's remote_json authorizer calls it by service DNS,
# so it gets no /api edge route (unlike the shop services' full-service.yaml). It
# has no database, so migrations stay off. It does ship telemetry like the rest of
# the full platform, and talks to the real SpiceDB chart using the SOPS-managed
# preshared key (spicedb-creds, mounted via secrets.envFrom in the skaffold module).
ingress:
  enabled: false           # internal authorizer — no edge route
migrations:
  enabled: false           # no database

otel:
  endpoint: "http://otel-collector.platform.svc.cluster.local:4317"
  deployEnv: "local"

env:
  SPICEDB_ENDPOINT: "spicedb.platform.svc.cluster.local:50051"
  # Blank so libs/go/authz falls back to spicedb-creds.preshared_key (envFrom),
  # overriding local-service.yaml's inner-loop "dev" literal.
  SPICEDB_PRESHARED_KEY: ""
  OTEL_SDK_DISABLED: "false"
