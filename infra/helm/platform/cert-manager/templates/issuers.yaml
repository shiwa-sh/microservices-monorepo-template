# Cluster-scoped issuers. The Let's Encrypt issuer uses DNS-01 via Cloudflare;
# credentials come from the SOPS-managed Secret `cloudflare-api-token`.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: letsencrypt }
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@example.com
    privateKeySecretRef: { name: letsencrypt-account }
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef: { name: cloudflare-api-token, key: token }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard
  namespace: traefik
spec:
  secretName: wildcard-tls
  issuerRef: { name: letsencrypt, kind: ClusterIssuer }
  dnsNames:
    - "*.{{ "{{ .Values.envHost }}" }}"
---
# Ops-tier wildcard (ADR-0017). The product wildcard `*.<host>` covers only one
# label, so the two-labels-deep ops tools (`{tool}.ops.<host>`) need their own
# `*.ops.<host>` cert. Routes in infra/gateway reference secret wildcard-ops-tls.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-ops
  namespace: traefik
spec:
  secretName: wildcard-ops-tls
  issuerRef: { name: letsencrypt, kind: ClusterIssuer }
  dnsNames:
    - "*.ops.{{ "{{ .Values.envHost }}" }}"
