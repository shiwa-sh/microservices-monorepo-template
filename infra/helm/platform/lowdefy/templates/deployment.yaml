apiVersion: apps/v1
kind: Deployment
metadata:
  name: lowdefy
  namespace: platform
  labels: { app.kubernetes.io/name: lowdefy }
spec:
  replicas: {{ .Values.replicas }}
  selector: { matchLabels: { app.kubernetes.io/name: lowdefy } }
  template:
    metadata: { labels: { app.kubernetes.io/name: lowdefy } }
    spec:
      containers:
        - name: lowdefy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ name: http, containerPort: 3000 }]
          env:
            {{- range $k, $v := .Values.env }}
            - { name: {{ $k }}, value: {{ $v | quote }} }
            {{- end }}
          readinessProbe: { tcpSocket: { port: http } }
---
apiVersion: v1
kind: Service
metadata: { name: lowdefy, namespace: platform }
spec:
  type: ClusterIP
  selector: { app.kubernetes.io/name: lowdefy }
  ports: [{ name: http, port: 80, targetPort: http }]
