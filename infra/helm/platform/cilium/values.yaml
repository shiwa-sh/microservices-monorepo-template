cilium:
  # k3s runs its own API server on localhost:6443.
  kubeProxyReplacement: true
  k8sServiceHost: 127.0.0.1
  k8sServicePort: 6443

  ipam:
    mode: kubernetes

  # Hubble gives per-flow network visibility without a sidecar (ADR-0003). It is
  # the audit surface for internal header-trust (ADR-0009). The UI is deployed
  # and exposed auth-gated at /hubble/* via the gateway IngressRoute (infra/gateway).
  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: true
      # Served under /hubble; Traefik strips nothing, so set the UI base path.
      baseUrl: /hubble
