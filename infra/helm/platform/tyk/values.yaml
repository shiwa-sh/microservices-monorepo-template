# Tyk Gateway OSS (ADR-0009). No Dashboard/license — that is the licensed
# tyk-stack chart. Redis is provided by the bundled simple-redis dev chart
# locally (it always creates a Service named "redis"); in prod disable
# simple-redis and point global.redis.addrs at a managed Redis.
simple-redis:
  enabled: true

tyk-oss:
  global:
    redis:
      addrs: ["redis.platform.svc.cluster.local:6379"]
    components:
      pump: false
      operator: false          # Tyk Operator needs cert-manager, which is off locally (ADR-0003)
    tls:
      gateway: false           # TLS terminates upstream at the ingress (ADR-0003)
  tyk-gateway:
    gateway:
      kind: Deployment
      replicaCount: 2
      service:
        type: ClusterIP
      extraEnvs:
        - { name: TYK_GW_OAUTHTOKENEXPIRE, value: "3600" }

# Hand-written security policies live at infra/gateway/policies/. They are loaded
# via the Tyk Operator's SecurityPolicy CRD by the gitops layer in environments
# where the operator runs (it requires cert-manager, so it is off locally).
