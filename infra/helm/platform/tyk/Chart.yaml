apiVersion: v2
name: tyk
description: Tyk Gateway OSS (ADR-0009), Redis-backed.
type: application
version: 0.1.0
appVersion: "5.7.0"

# OSS gateway via tyk-oss — NOT the licensed tyk-stack chart (it deploys the
# Dashboard and runs a bootstrap job that fails without a Dashboard license).
# simple-redis provides a dev Redis locally (Service "redis"); in prod disable
# simple-redis and point global.redis.addrs at a managed Redis.
dependencies:
  - name: tyk-oss
    version: "5.2.0"
    repository: https://helm.tyk.io/public/helm/charts/
  - name: simple-redis
    version: "0.1.1"
    repository: https://helm.tyk.io/public/helm/charts/
    condition: simple-redis.enabled
