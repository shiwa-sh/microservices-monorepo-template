apiVersion: v1
kind: Service
metadata:
  name: spicedb
  namespace: platform
  labels:
    app.kubernetes.io/name: spicedb
spec:
  selector:
    app.kubernetes.io/name: spicedb
  ports:
    - { name: grpc,    port: 50051, targetPort: grpc }
    - { name: http,    port: 8443,  targetPort: http }
    - { name: metrics, port: 9090,  targetPort: metrics }
