apiVersion: v2
name: platform-umbrella
description: |
  Convenience umbrella chart used ONLY by `mise run dev:up` to install the
  platform stack into a local k3d cluster (ADR-0003). In prod the same charts
  are installed individually by ArgoCD ApplicationSets.
type: application
version: 0.1.0

# Local-only path: directory references against sibling charts. ArgoCD does the
# real fan-out from infra/gitops/ in prod (ADR-0004).
dependencies:
  - { name: cert-manager,   version: "0.1.0", repository: "file://../cert-manager",   condition: certManager.enabled }
  - { name: postgres,       version: "0.1.0", repository: "file://../postgres",       condition: postgres.enabled }
  - { name: temporal,       version: "0.1.0", repository: "file://../temporal",       condition: temporal.enabled }
  - { name: tyk,            version: "0.1.0", repository: "file://../tyk",            condition: tyk.enabled }
  - { name: ory,            version: "0.1.0", repository: "file://../ory",            condition: ory.enabled }
  - { name: spicedb,        version: "0.1.0", repository: "file://../spicedb",        condition: spicedb.enabled }
  - { name: observability,  version: "0.1.0", repository: "file://../observability",  condition: observability.enabled }
  - { name: minio,          version: "0.1.0", repository: "file://../minio",          condition: minio.enabled }
  - { name: sops-operator,  version: "0.1.0", repository: "file://../sops-operator",  condition: sopsOperator.enabled }
  - { name: lowdefy,        version: "0.1.0", repository: "file://../lowdefy",        condition: lowdefy.enabled }
