kratos:
  kratos:
    config:
      dsn: "postgres://kratos@postgres-rw.platform.svc.cluster.local:5432/kratos?sslmode=disable"
      identity:
        default_schema_id: user_v1
        schemas:
          - id: user_v1
            url: file:///etc/config/identity-schemas/user.v1.json
      selfservice:
        default_browser_return_url: https://dev.example.com/
        flows:
          login:        { ui_url: https://dev.example.com/auth/login }
          registration: { ui_url: https://dev.example.com/auth/register }
          recovery:     { ui_url: https://dev.example.com/auth/recovery }
          settings:     { ui_url: https://dev.example.com/auth/settings }
    # Inlined from infra/auth/kratos/identity-schemas/user.v1.json (canonical
    # source). Helm cannot read files outside a chart, so keep the two in sync.
    identitySchemas:
      "user.v1.json": |
        {
          "$id": "https://example.com/identity-schemas/user.v1.json",
          "$schema": "http://json-schema.org/draft-07/schema#",
          "title": "User",
          "type": "object",
          "properties": {
            "traits": {
              "type": "object",
              "properties": {
                "email": {
                  "type": "string",
                  "format": "email",
                  "title": "E-Mail",
                  "ory.sh/kratos": {
                    "credentials": { "password": { "identifier": true } },
                    "verification": { "via": "email" },
                    "recovery":     { "via": "email" }
                  }
                },
                "name": { "type": "string", "title": "Name" }
              },
              "required": ["email"],
              "additionalProperties": false
            }
          }
        }

hydra:
  hydra:
    config:
      dsn: "postgres://hydra@postgres-rw.platform.svc.cluster.local:5432/hydra?sslmode=disable"
      urls:
        self:
          issuer: https://dev.example.com/oauth2/
        login:   https://dev.example.com/auth/login
        consent: https://dev.example.com/auth/consent
        logout:  https://dev.example.com/auth/logout
