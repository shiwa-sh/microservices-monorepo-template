temporal:
  server:
    config:
      persistence:
        default:
          driver: sql
          sql:
            driver: postgres12
            host: postgres-rw.platform.svc.cluster.local
            port: 5432
            database: temporal
            user: dev
            existingSecret: temporal-db-creds
        visibility:
          driver: sql
          sql:
            driver: postgres12
            host: postgres-rw.platform.svc.cluster.local
            port: 5432
            database: temporal_visibility
            user: dev
            existingSecret: temporal-db-creds
      # Register the `default` namespace via the chart's setup job. The split
      # production topology doesn't auto-create it the way `start-dev` does, so
      # workers targeting TEMPORAL_NAMESPACE=default fail without this. The chart
      # reads this at server.config.namespaces (NOT server.namespaces).
      namespaces:
        create: true
        namespace:
          - name: default
            retention: 3d
  cassandra: { enabled: false }
  prometheus: { enabled: false }       # we scrape from OTel collector instead
  grafana:   { enabled: false }
  elasticsearch: { enabled: false }
  # CNPG (infra/helm/platform/postgres) already provisions the temporal /
  # temporal_visibility databases via postInitApplicationSQL.
  schema:
    createDatabase: { enabled: false }
  web:
    image:
      repository: temporalio/ui
      tag: "2.32.0"
