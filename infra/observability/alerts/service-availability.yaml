# Sample alert (ADR-0011). Mimir PrometheusRule format.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: { name: service-availability, namespace: platform }
spec:
  groups:
    - name: service.availability
      rules:
        - alert: ServiceHigh5xx
          expr: |
            sum by (service_name) (rate(http_server_duration_milliseconds_count{http_response_status_code=~"5.."}[5m]))
              / sum by (service_name) (rate(http_server_duration_milliseconds_count[5m]))
              > 0.05
          for: 10m
          labels: { severity: page }
          annotations:
            summary: "{{ $labels.service_name }} has >5% 5xx rate for 10m"
