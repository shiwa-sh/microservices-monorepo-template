all:
  children:
    servers:
      hosts:
        # Committed inventory of pre-provided hosts (ADR-0003) — the day-one
        # path. Fill in the SSH-reachable IPs of the machines you were given;
        # the first host initializes the embedded etcd, the rest join.
        k3s-dev-1: { ansible_host: 203.0.113.11 }
        k3s-dev-2: { ansible_host: 203.0.113.12 }
        k3s-dev-3: { ansible_host: 203.0.113.13 }
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
