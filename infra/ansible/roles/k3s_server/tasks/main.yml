# Install k3s in HA mode with embedded etcd (ADR-0003).
- name: Install k3s on the first server node
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} \
      sh -s - server --cluster-init \
        --disable=traefik \
        --tls-san={{ inventory_hostname }} \
        --node-taint=CriticalAddonsOnly=true:NoExecute
  args: { creates: /usr/local/bin/k3s }
  when: inventory_hostname == groups['servers'][0]

- name: Capture join token from the first server
  slurp: { src: /var/lib/rancher/k3s/server/node-token }
  register: k3s_token
  when: inventory_hostname == groups['servers'][0]

- name: Install k3s on the other server nodes
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} \
      K3S_URL=https://{{ groups['servers'][0] }}:6443 \
      K3S_TOKEN={{ hostvars[groups['servers'][0]].k3s_token.content | b64decode | trim }} \
      sh -s - server --disable=traefik
  args: { creates: /usr/local/bin/k3s }
  when: inventory_hostname != groups['servers'][0]
