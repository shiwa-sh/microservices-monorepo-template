# Inner dev loop (ADR-0003): build service images, deploy them into the local
# k3d cluster, and live-rebuild on change.
#   mise run cluster:up               # create the k3d cluster + deps (once)
#   skaffold dev                      # build + deploy + watch ALL services
#   skaffold dev -m orders            # only one service (others keep running)
#   skaffold dev -m orders -m catalog # a subset
#   skaffold dev -m orders -m platform# add the deps port-forwards (temporal/db)
#
# This file holds one `Config` module per service plus a `platform` module for
# the dependency port-forwards. `skaffold dev` (no -m) runs every module; `-m
# <name>` filters to the module(s) whose metadata.name matches. Each service is
# isolated, so editing one only rebuilds that service's images — reinforced by
# the per-service `COPY` in each Dockerfile and the root .dockerignore.
#
# Same service chart as prod (infra/helm/service); only laptop knobs differ
# (infra/helm/values/local-service.yaml). Adding a service = copy a module
# block below + its Dockerfile artifacts. If `skaffold` is newer than this
# schema, run `skaffold fix`.
#
# Lightweight deps (Postgres, Temporal, SpiceDB) are owned solely by
# `mise run cluster:up` (kubectl apply infra/local/deps.yaml); no module
# deploys them, so a single-service run still talks to the running deps over
# in-cluster DNS. The `platform` module only port-forwards them for local tools.

apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: orders
build:
  local: { push: false, useBuildkit: true }
  artifacts:
    - image: orders-server
      context: .
      docker: { dockerfile: services/orders/Dockerfile, buildArgs: { SERVICE: orders, APP_CMD: server } }
    - image: orders-worker
      context: .
      docker: { dockerfile: services/orders/Dockerfile, buildArgs: { SERVICE: orders, APP_CMD: worker } }
manifests:
  helm:
    releases:
      - name: orders
        chartPath: infra/helm/service
        namespace: platform
        createNamespace: true
        valuesFiles: [infra/helm/values/local-service.yaml]
        setValues: { name: orders, worker.enabled: true, "secrets.envFrom": "{orders-db}" }
        setValueTemplates:
          image.repository: "{{.IMAGE_REPO_orders_server}}"
          image.tag: "{{.IMAGE_TAG_orders_server}}"
          worker.image.repository: "{{.IMAGE_REPO_orders_worker}}"
          worker.image.tag: "{{.IMAGE_TAG_orders_worker}}"
deploy:
  kubeContext: k3d-platform-dev
  helm: {}
portForward:
  # The service chart names the Service `<name>-server` and exposes port 80
  # (see infra/helm/service/templates/service.yaml).
  - { resourceType: service, resourceName: orders-server, namespace: platform, port: 80, localPort: 8080 }

