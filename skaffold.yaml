# Inner dev loop (ADR-0003). One `Config` module per service; `skaffold dev`
# runs all, `-m <name>` filters. Adding a service = copy a module block below.
#   mise run cluster:up               # create the k3d cluster + deps (once)
#   skaffold dev                      # build + deploy + watch ALL services
#   skaffold dev -m orders            # only one service
#   skaffold dev -m orders -m platform# add the deps port-forwards (temporal/db)
#
# Deps (Postgres, Temporal, SpiceDB) are owned by `mise run cluster:up`, not any
# module; the `platform` module only port-forwards them for local tools.

apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: orders
build:
  local: { push: false, useBuildkit: true }
  artifacts:
    - image: orders-server
      context: .
      docker: { dockerfile: services/orders/Dockerfile, buildArgs: { SERVICE: orders, APP_CMD: server } }
    - image: orders-worker
      context: .
      docker: { dockerfile: services/orders/Dockerfile, buildArgs: { SERVICE: orders, APP_CMD: worker } }
manifests:
  helm:
    releases:
      - name: orders
        chartPath: infra/helm/service
        namespace: platform
        createNamespace: true
        valuesFiles: [infra/helm/values/local-service.yaml]
        setValues: { name: orders, worker.enabled: true, "secrets.envFrom": "{orders-db}" }
        setValueTemplates:
          image.repository: "{{.IMAGE_REPO_orders_server}}"
          image.tag: "{{.IMAGE_TAG_orders_server}}"
          worker.image.repository: "{{.IMAGE_REPO_orders_worker}}"
          worker.image.tag: "{{.IMAGE_TAG_orders_worker}}"
deploy:
  kubeContext: k3d-platform-dev
  helm: {}
# `full` (scripts/cluster-full.sh): layer the full-tier overlay so the service is
# exposed through the edge and ships telemetry. See infra/helm/values/full-service.yaml.
profiles:
  - name: full
    patches:
      - { op: add, path: /manifests/helm/releases/0/valuesFiles/-, value: infra/helm/values/full-service.yaml }
portForward:
  - { resourceType: service, resourceName: orders-server, namespace: platform, port: 80, localPort: 8080 }

