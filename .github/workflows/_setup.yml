# Reusable workflow: check out the repo and install the mise toolchain.
# Used by all other workflows so toolchain setup is defined exactly once.
name: setup

on:
  workflow_call:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
